<!DOCTYPE html>
<html>
<head>
  <title>Raw WebGL Test</title>
  <style>body { margin: 0; background: #000; }</style>
</head>
<body>
  <canvas id="c" width="800" height="600" style="display:block;"></canvas>
  <div id="info" style="position:fixed;top:10px;left:10px;color:lime;font:18px monospace;background:rgba(0,0,0,0.8);padding:10px;"></div>
  <script>
    const info = document.getElementById('info');
    function log(msg) { info.textContent += msg + '\n'; console.log(msg); }

    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    if (!gl) { log('NO WEBGL'); }
    else {
      log('GL: ' + gl.getParameter(gl.VERSION));
      log('Renderer: ' + gl.getParameter(gl.RENDERER));

      // Clear to blue
      gl.clearColor(0.2, 0.2, 0.4, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);

      // Draw a red triangle
      const vs = `attribute vec4 p; void main(){gl_Position=p;}`;
      const fs = `precision mediump float; void main(){gl_FragColor=vec4(1,0,0,1);}`;

      function mkShader(src, type) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) log('Shader err: ' + gl.getShaderInfoLog(s));
        return s;
      }

      const prog = gl.createProgram();
      gl.attachShader(prog, mkShader(vs, gl.VERTEX_SHADER));
      gl.attachShader(prog, mkShader(fs, gl.FRAGMENT_SHADER));
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) log('Link err: ' + gl.getProgramInfoLog(prog));
      gl.useProgram(prog);

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0,0.8,0, -0.8,-0.8,0, 0.8,-0.8,0]), gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, 'p');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 3, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.TRIANGLES, 0, 3);

      // Read center pixel
      const px = new Uint8Array(4);
      gl.readPixels(400, 300, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
      log('Center pixel: rgba(' + px[0] + ',' + px[1] + ',' + px[2] + ',' + px[3] + ')');
      log('GL error: ' + gl.getError());
      log('Can you see a RED triangle on BLUE background?');
    }
  </script>
</body>
</html>
